name: Daily AI News + Remote Jobs

on:
  schedule:
    # 01:30 UTC = 07:00 IST
    - cron: '30 1 * * *'
  workflow_dispatch:

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          GOOGLE_SERVICE_ACCOUNT_JSON_CONTENT: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON_CONTENT }}
          DRIVE_FOLDER_ID: ${{ secrets.DRIVE_FOLDER_ID }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python tools/run_daily_pipeline.py

      - name: Upload PDF artifact (kept 7 days)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-pdf
          path: |
            .tmp/ai_news_remote_jobs_*.pdf
            .tmp/jobs.csv
            .tmp/pipeline.log
          retention-days: 7
          if-no-files-found: warn

      - name: Notify Slack on workflow failure
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          python - <<'PY'
          import os, sys
          sys.path.insert(0, ".")
          from tools.notify_slack import notify, tail_log
          notify("GitHub Actions job", "Workflow exited non-zero", tail_log(".tmp/pipeline.log"))
          PY
